<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Fralda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #EAF1EA;
    --card: #FFFFFF;
    --ink: #253434;
    --ink-soft: #47585A;
    --coral: #F4886B;
    --coral-deep: #E06B4C;
    --gold: #E8B75A;
    --sage: #5C7A6B;
    --sage-pale: #C9DACB;
    --line: #D7E2D9;
    --radius: 18px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Karla', sans-serif; -webkit-font-smoothing: antialiased; overflow-x:hidden; }
  body{
    background-image:
      radial-gradient(circle at 15% 8%, rgba(232,183,90,0.12), transparent 40%),
      radial-gradient(circle at 85% 12%, rgba(244,136,107,0.10), transparent 40%);
    min-height: 100vh; padding: 32px 16px 64px;
  }
  .wrap{ max-width: 760px; margin: 0 auto; }
  .page-grid{ display:block; }
  @media (min-width: 1100px){
    .wrap{ max-width: 1180px; }
    .page-grid{ display:grid; grid-template-columns: 1fr 340px; gap:24px; align-items:start; }
    .side-col{ position: sticky; top: 20px; max-height: 88vh; overflow-y:auto; }
  }
  .countdown{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:16px; }
  .countdown-unit{ background: var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 16px; min-width:64px; text-align:center; }
  .countdown-num{ font-family:'Space Mono', monospace; font-weight:700; font-size:22px; color: var(--coral-deep); display:block; }
  .countdown-label{ font-size:11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
  .confirm-banner{ background: linear-gradient(135deg, rgba(92,122,107,0.14), rgba(201,218,203,0.3)); border:1px solid var(--sage-pale); }
  .confirm-banner .label{ font-family:'Baloo 2'; font-weight:700; font-size:14px; color: var(--sage); }
  .whatsapp-btn{ display:inline-flex; align-items:center; gap:8px; background:#25D366; color:white; font-family:'Baloo 2'; font-weight:700; font-size:14px; padding:10px 18px; border-radius:999px; text-decoration:none; margin-top:10px; }
  .confirm-code{ font-family:'Space Mono', monospace; font-weight:700; background:white; padding:3px 8px; border-radius:6px; border:1px solid var(--sage-pale); }
  .how-to{ background:#F2F6F2; border-color:var(--sage-pale); }
  .how-step{ display:flex; align-items:center; gap:14px; padding:8px 0; font-size:15.5px; }
  .how-num{ font-family:'Baloo 2'; font-weight:800; font-size:18px; color:white; background:var(--sage); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .how-num.how-num-alt{ background: var(--gold); }
  .btn-multi-toggle{ font-family:'Baloo 2'; font-weight:700; font-size:15.5px; background: var(--gold); color:white; border:none; padding:14px 26px; border-radius:14px; cursor:pointer; box-shadow: 0 6px 16px rgba(232,183,90,0.4); display:inline-flex; align-items:center; gap:10px; }
  .btn-multi-toggle.active{ background: var(--sage); box-shadow: 0 6px 16px rgba(92,122,107,0.35); }
  .mural-item{ padding:12px 0; border-bottom:1px solid var(--line); }
  .mural-item:last-child{ border-bottom:none; }
  .mural-name{ font-weight:700; font-size:14px; }
  .mural-meta{ font-family:'Space Mono', monospace; font-size:11px; color: var(--sage); margin-top:2px; }
  .mural-msg{ font-size:13px; color: var(--ink-soft); font-style:italic; margin-top:4px; line-height:1.4; }
  h1,h2,h3{ font-family: 'Baloo 2', sans-serif; margin: 0; }
  header.hero{ text-align:center; margin-bottom: 24px; }
  .eyebrow{ font-family:'Space Mono', monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--sage); font-weight:700; display:block; margin-bottom:8px; }
  h1.title{ font-size: 32px; font-weight:700; line-height:1.15; }
  .subtitle{ color: var(--ink-soft); font-size:15px; margin-top:10px; line-height:1.5; }
  .card{ background: var(--card); border-radius: var(--radius); padding: 22px; box-shadow: 0 1px 2px rgba(37,52,52,0.04), 0 8px 24px -12px rgba(37,52,52,0.10); border: 1px solid var(--line); margin-bottom: 18px; }
  .priority{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; background: linear-gradient(135deg, rgba(244,136,107,0.14), rgba(232,183,90,0.14)); border: 1px solid rgba(224,107,76,0.25); }
  .priority .label{ font-family:'Baloo 2'; font-weight:700; font-size:14px; color: var(--coral-deep); }
  .chip{ font-family:'Space Mono', monospace; font-size:13px; font-weight:700; background: var(--coral); color:white; padding:5px 12px; border-radius:999px; }
  .priority.done{ background: linear-gradient(135deg, rgba(92,122,107,0.10), rgba(201,218,203,0.25)); border-color: var(--sage-pale); }
  .priority.done .label{ color: var(--sage); }
  .size-overview-row{ padding: 14px 0; border-bottom: 1px solid var(--line); }
  .size-overview-row:last-child{ border-bottom:none; }
  .size-overview-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .size-code{ font-family:'Baloo 2'; font-weight:800; font-size:20px; }
  .size-count{ font-family:'Space Mono', monospace; font-size:12.5px; color: var(--ink-soft); }
  .progress-track{ margin-top:8px; height:10px; border-radius:999px; background: var(--sage-pale); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background: linear-gradient(90deg, var(--coral), var(--coral-deep)); transition: width .3s ease; }
  .filter-bar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:4px; }
  .filter-btn{ font-family:'Baloo 2'; font-weight:700; font-size:15px; background: #F2F6F2; color: var(--sage); border:2px solid var(--sage-pale); padding:12px 20px; border-radius:14px; cursor:pointer; }
  .filter-btn.active{ background: var(--sage); color:white; border-color: var(--sage); }
  .filter-check{ margin-left:auto; display:flex; align-items:center; gap:6px; font-size:13px; color: var(--ink-soft); }
  .filter-hint{ width:100%; font-size:12.5px; color: var(--ink-soft); margin: -2px 0 2px; }
  .product-filter-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin: 14px 0 4px; padding-top:14px; border-top:1px solid var(--line); max-width:100%; }
  .product-filter-label{ font-family:'Baloo 2'; font-weight:700; font-size:14px; color: var(--sage); }
  #product-filter{ flex:1 1 0; min-width:0; max-width:100%; height:46px; line-height:1.2; padding:0 36px 0 14px; border-radius:12px; border:1.5px solid var(--sage-pale); font-family:'Karla'; font-size:14.5px; color:var(--ink); background-color:#F7FAF7; cursor:pointer; -webkit-appearance:none; -moz-appearance:none; appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C7A6B' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat:no-repeat; background-position: right 12px center; background-size:16px; }
  @media (max-width:520px){
    .product-filter-row{ flex-direction:column; align-items:stretch; }
    #product-filter{ flex:none; width:100%; }
  }
  .groups-container{ display:block; }
  @media (min-width: 900px){
    .groups-container{ display:grid; gap:20px; align-items:start; }
    .size-column{ max-height: 72vh; overflow-y:auto; padding-right:8px; }
  }
  .group-header{ display:flex; justify-content:space-between; align-items:baseline; margin: 20px 0 8px; position: sticky; top: 0; background: var(--card); padding: 10px 0; z-index: 5; border-bottom: 2px solid var(--sage-pale); }
  .group-header:first-child{ margin-top:2px; }
  .group-title{ font-family:'Baloo 2'; font-weight:700; font-size:17px; }
  .group-sub{ font-family:'Space Mono', monospace; font-size:12px; color: var(--ink-soft); }
  .item-row{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:6px 10px; padding: 10px 12px; border-radius: 12px; margin-bottom:6px; background:#FBFDFB; border:1px solid var(--line); }
  .item-row.taken{ background:#F5F2ED; }
  .item-left{ display:flex; align-items:baseline; flex-wrap:wrap; gap:6px 10px; min-width:0; flex:1 1 160px; }
  .item-num{ font-family:'Space Mono', monospace; font-weight:700; font-size:13px; color: var(--sage); flex-shrink:0; }
  .item-desc{ font-size:15.5px; line-height:1.4; }
  .item-right{ flex:0 0 auto; display:flex; flex-wrap:wrap; align-items:center; gap:6px 8px; }
  .btn-reserve{ font-family:'Baloo 2'; font-weight:700; font-size:14.5px; background: var(--coral-deep); color:white; border:none; padding:10px 18px; border-radius:999px; cursor:pointer; }
  .btn-release{ font-family:'Karla'; font-size:11.5px; color: var(--ink-soft); background:none; border:none; text-decoration:underline; cursor:pointer; padding:2px; }
  .badge-taken{ font-family:'Space Mono', monospace; font-size:11px; font-weight:700; color: var(--sage); background: var(--sage-pale); padding:3px 9px; border-radius:999px; }
  .reserve-form{ grid-column: 1 / -1; width:100%; margin-top:8px; padding-top:10px; border-top:1px dashed var(--line); }
  .reserve-form input, .reserve-form textarea{ width:100%; padding:9px 11px; border-radius:10px; border:1.5px solid var(--line); font-family:'Karla'; font-size:14px; margin-bottom:8px; background:white; }
  .reserve-form input:focus, .reserve-form textarea:focus{ outline:none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(244,136,107,0.15); }
  .reserve-form-actions{ display:flex; gap:8px; }
  .btn-confirm{ font-family:'Baloo 2'; font-weight:700; font-size:13.5px; background: var(--coral-deep); color:white; border:none; padding:8px 16px; border-radius:999px; cursor:pointer; }
  .btn-cancel{ font-family:'Karla'; font-size:13px; color: var(--ink-soft); background:none; border:1.5px solid var(--line); padding:8px 14px; border-radius:999px; cursor:pointer; }
  .item-row-wrap{ display:flex; flex-direction:column; }
  label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:4px; }
  .footer-note{ text-align:center; font-size:12px; color: var(--ink-soft); margin-top: 8px; line-height:1.6; }
  .item-check{ width:18px; height:18px; cursor:pointer; flex-shrink:0; accent-color: var(--coral-deep); }
  .batch-bar{ position:fixed; left:50%; transform:translateX(-50%); bottom:16px; background: var(--ink); color:white; padding:14px 18px; border-radius:16px; display:flex; flex-direction:column; gap:10px; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,0.25); font-size:13.5px; max-width:92vw; width:380px; }
  .batch-bar-summary{ display:flex; flex-direction:column; gap:3px; }
  .batch-bar-line{ font-size:12.5px; color:#D8E2D8; }
  .batch-bar-actions{ display:flex; gap:10px; justify-content:center; }
  .batch-bar button{ font-family:'Baloo 2'; font-weight:700; font-size:13.5px; border:none; border-radius:999px; padding:9px 16px; cursor:pointer; flex:1; }
  .btn-batch-confirm{ background: var(--coral-deep); color:white; }
  .btn-batch-cancel{ background:transparent; color:white; border:1px solid rgba(255,255,255,0.4); }
  .toast.show{ opacity:1; bottom:32px; }
  .loading{ text-align:center; padding: 60px 0; color: var(--ink-soft); }
  @media (max-width:480px){ .item-left{ flex-wrap:wrap; } }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="loading" id="loading">Carregando a lista… 🧷</div>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* =======================================================
   CONFIGURAÇÃO — troque pelos dados do SEU projeto Supabase
   Encontre em: Supabase > seu projeto > Settings > API
   - SUPABASE_URL = campo "API URL" (antigo "Project URL")
   - SUPABASE_ANON_KEY = aba "API Keys" > "Publishable key"
     (ou "anon public", em contas com o sistema antigo)
   ======================================================= */
const SUPABASE_URL = 'https://hlenzywbobdinapytwre.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HighvqdWWG7FhY8qYYC7sA_IjiSuaYs';

/* Nome do bebê exibido no topo da página */
const BABY_NAME = 'Maria Luiza';

/* Data e hora do chá — formato: 'AAAA-MM-DDTHH:MM:00' (horário local) */
const EVENT_DATE = '2026-07-18T16:00:00'; // 18/07/2026 às 16h

/* Número de WhatsApp de quem vai receber as confirmações.
   Formato: código do país + DDD + número, só números, sem espaços/traços.
   Exemplo Brasil (21) 99999-9999 => '5521999999999' */
const HOST_WHATSAPP_NUMBER = '5522992818403'; // Rodrigo — troque para '5522988150701' se preferir o da Sâmi
/* ======================================================= */

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SIZE_ORDER = ['P','M','G'];
const PRODUCT_ORDER = ['Lenço umedecido','Pomada para assaduras','Sabonete líquido infantil','Shampoo infantil','Hidratante infantil','Óleo infantil','Algodão','Cotonetes infantis','Escova para mamadeira','Sabonete em barra infantil','Creme preventivo para assaduras'];

let items = [];
let sizeFilter = 'ALL';
let productFilter = 'ALL';
let onlyAvailable = false;
let expandedRow = null;
let selectedIds = new Set();
let multiMode = false;
let lastConfirmation = null;

function buildWhatsAppLink(conf){
  const itemsText = conf.items.map(it => `Nº ${it.id} (fralda ${it.size} + ${it.extra})`).join(', ');
  const text = `Oi! Aqui é ${conf.name}. Acabei de reservar no Chá de Fralda da ${BABY_NAME}: ${itemsText}. 💛`;
  return `https://wa.me/${HOST_WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2800);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : str;
  return d.innerHTML;
}

async function loadItems(){
  const { data, error } = await sb.from('diaper_items').select('*').order('id');
  if(error){
    document.getElementById('app').innerHTML = `
      <div class="loading">
        <p>⚠️ Não consegui carregar a lista.</p>
        <p style="font-size:12.5px; margin-top:8px;">Detalhe técnico: ${escapeHtml(error.message)}</p>
        <p style="font-size:12.5px; margin-top:8px;">Confira se SUPABASE_URL e SUPABASE_ANON_KEY estão preenchidos corretamente no arquivo index.html.</p>
      </div>`;
    return;
  }
  items = data;
  render();
}

function statsFor(size){
  const list = items.filter(i => i.size === size);
  const claimed = list.filter(i => i.claimed_by).length;
  return { total: list.length, claimed };
}

function buildMural(){
  const claimed = items.filter(i => i.claimed_by)
    .sort((a,b) => new Date(b.claimed_at || 0) - new Date(a.claimed_at || 0));
  if(!claimed.length) return `<p style="font-size:13px;color:var(--ink-soft);">Ainda ninguém reservou nada por aqui. Seja a primeira pessoa! 💛</p>`;
  return claimed.map(i => `
    <div class="mural-item">
      <div class="mural-name">${escapeHtml(i.claimed_by)}</div>
      <div class="mural-meta">Nº ${i.id} · fralda ${i.size} + ${escapeHtml(i.extra_item)}</div>
      ${i.message ? `<div class="mural-msg">"${escapeHtml(i.message)}"</div>` : ''}
    </div>`).join('');
}

function renderCountdown(){
  const target = new Date(EVENT_DATE).getTime();
  const now = Date.now();
  const diff = target - now;

  if(isNaN(target)) return '';
  if(diff <= 0){
    return `<div class="countdown"><div class="countdown-unit" style="min-width:auto; padding:10px 22px;"><span class="countdown-label" style="font-size:14px; color:var(--sage);">🎉 O grande dia chegou!</span></div></div>`;
  }
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  return `
    <div class="countdown">
      <div class="countdown-unit"><span class="countdown-num">${days}</span><span class="countdown-label">dia${days===1?'':'s'}</span></div>
      <div class="countdown-unit"><span class="countdown-num">${hours}</span><span class="countdown-label">hora${hours===1?'':'s'}</span></div>
      <div class="countdown-unit"><span class="countdown-num">${mins}</span><span class="countdown-label">min</span></div>
    </div>`;
}

// Atualiza só o contador a cada minuto, sem recarregar a lista inteira
setInterval(() => {
  const el = document.querySelector('.countdown');
  if(el) el.outerHTML = renderCountdown();
}, 60000);

function buildSelectionSummary(){
  const selected = items.filter(i => selectedIds.has(i.id));
  const bySize = {};
  const byProduct = {};
  selected.forEach(i => {
    bySize[i.size] = (bySize[i.size] || 0) + 1;
    byProduct[i.extra_item] = (byProduct[i.extra_item] || 0) + 1;
  });
  const sizeText = Object.entries(bySize).map(([s,c]) => `${c}x fralda ${s}`).join(', ');
  const productText = Object.entries(byProduct).map(([p,c]) => `${c}x ${p}`).join(', ');
  return { sizeText, productText, count: selected.length };
}

function render(){
  const app = document.getElementById('app');

  // Guarda a posição de rolagem de cada coluna e do mural antes de redesenhar,
  // para não "pular" a tela quando o usuário abre um formulário ou marca um filtro.
  const scrollState = {};
  document.querySelectorAll('.size-column[data-size]').forEach(el => {
    scrollState[el.getAttribute('data-size')] = el.scrollTop;
  });
  const sideColBefore = document.querySelector('.side-col');
  if(sideColBefore) scrollState.__side__ = sideColBefore.scrollTop;
  const pageScrollY = window.scrollY;

  const overviewRows = SIZE_ORDER.map(size => {
    const { total, claimed } = statsFor(size);
    const pct = total ? Math.round((claimed/total)*100) : 0;
    return `
      <div class="size-overview-row">
        <div class="size-overview-top">
          <span class="size-code">${size}</span>
          <span class="size-count">${claimed} de ${total} reservados</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');

  const needy = SIZE_ORDER.map(size => ({ size, ...statsFor(size) }))
    .filter(x => x.claimed < x.total)
    .sort((a,b) => (a.claimed/a.total) - (b.claimed/b.total))
    .slice(0,3);

  const priorityBlock = needy.length
    ? `<div class="card priority"><span class="label">🎯 Ainda tem bastante item livre em:</span>${needy.map(n => `<span class="chip">${n.size}</span>`).join('')}</div>`
    : `<div class="card priority done"><span class="label">🎉 Todos os 100 itens da lista já foram reservados!</span></div>`;

  const confirmBanner = lastConfirmation ? `
    <div class="card confirm-banner">
      <span class="label">🎉 Reservado, ${escapeHtml(lastConfirmation.name)}!</span>
      <p style="font-size:13.5px; color:var(--ink-soft); margin:8px 0;">
        ${lastConfirmation.items.map(it => `Nº ${it.id} (fralda ${it.size} + ${escapeHtml(it.extra)})`).join('<br>')}
      </p>
      <p style="font-size:13px; color:var(--ink-soft);">Tudo certo, não precisa fazer mais nada! Se um dia mudar de ideia, é só voltar aqui e usar este código: <span class="confirm-code">${lastConfirmation.code}</span></p>
      <a class="whatsapp-btn" href="${buildWhatsAppLink(lastConfirmation)}" target="_blank" rel="noopener">📱 Confirmar no WhatsApp</a>
      <div style="margin-top:10px;"><button id="dismiss-confirm" style="background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-size:12px;">fechar</button></div>
    </div>` : '';

  const sizesToShow = sizeFilter === 'ALL' ? SIZE_ORDER : [sizeFilter];
  const groupsHtml = sizesToShow.map(size => {
    const { total, claimed } = statsFor(size);
    const rows = items.filter(i => i.size === size)
      .filter(i => !onlyAvailable || !i.claimed_by)
      .filter(i => productFilter === 'ALL' || i.extra_item === productFilter)
      .sort((a,b) => {
        const aTaken = a.claimed_by ? 1 : 0;
        const bTaken = b.claimed_by ? 1 : 0;
        if(aTaken !== bTaken) return aTaken - bTaken;
        return a.id - b.id;
      })
      .map(i => renderItemRow(i)).join('');
    return `
      <div class="size-column" data-size="${size}">
        <div class="group-header"><span class="group-title">Fralda ${size}</span><span class="group-sub">${claimed}/${total} reservados</span></div>
        ${rows || '<p style="font-size:13px;color:var(--ink-soft);">Nenhum item disponível com esse filtro.</p>'}
      </div>`;
  }).join('');

  app.innerHTML = `
    <header class="hero">
      <span class="eyebrow">Você foi convidado(a) para o</span>
      <h1 class="title">Chá de Fralda de ${escapeHtml(BABY_NAME)}</h1>
      <p class="subtitle">Escolha um número disponível na lista abaixo. Cada item já vem combinado com uma fralda + um produtinho, então é só reservar o seu e trazer os dois juntos. Obrigado por fazer parte disso! 💛</p>
      ${renderCountdown()}
    </header>

    <div class="page-grid">
      <div class="main-col">
        ${confirmBanner}
        ${priorityBlock}

        <div class="card">
          <h2 style="font-size:18px; margin-bottom:6px;">Progresso geral</h2>
          ${overviewRows}
        </div>

        <div class="card how-to">
          <div class="how-step"><span class="how-num">1</span><span>Escolha um número disponível na lista abaixo</span></div>
          <div class="how-step"><span class="how-num">2</span><span>Toque em <strong>"Reservar"</strong> e escreva seu nome</span></div>
          <div class="how-step"><span class="how-num">3</span><span>Traga a fralda + o produto do número escolhido no dia do chá</span></div>
          <div class="how-step"><span class="how-num how-num-alt">4</span><span>Quer dar <strong>mais de um pacote</strong>? Toque no botão abaixo para marcar vários itens e reservar todos de uma vez só</span></div>
          <div style="margin-top:14px; text-align:center;">
            <button class="btn-multi-toggle ${multiMode ? 'active' : ''}" id="toggle-multi">${multiMode ? '✓ Modo de vários pacotes ativado' : '➕ Quero dar mais de um pacote de fralda'}</button>
          </div>
        </div>

        <div class="card">
          <div class="filter-bar">
            <button class="filter-btn ${sizeFilter==='ALL'?'active':''}" data-filter="ALL">Ver todos</button>
            ${SIZE_ORDER.map(s => { const st = statsFor(s); return `<button class="filter-btn ${sizeFilter===s?'active':''}" data-filter="${s}">Só ${s} (${st.total - st.claimed} livres)</button>`; }).join('')}
            <span class="filter-hint">Toque num tamanho para ir direto pra ele, sem precisar rolar pelos outros.</span>
            <label class="filter-check"><input type="checkbox" id="only-available" ${onlyAvailable ? 'checked' : ''}> Só disponíveis</label>
          </div>
          <div class="product-filter-row">
            <label for="product-filter" class="product-filter-label">🧴 Ou procure por produto:</label>
            <select id="product-filter">
              <option value="ALL" ${productFilter==='ALL'?'selected':''}>Todos os produtos</option>
              ${PRODUCT_ORDER.map(p => {
                const list = items.filter(i => i.extra_item === p);
                if(!list.length) return '';
                const free = list.filter(i => !i.claimed_by).length;
                return `<option value="${escapeHtml(p)}" ${productFilter===p?'selected':''}>${p} (${free} disponíve${free===1?'l':'is'})</option>`;
              }).join('')}
            </select>
          </div>
          <div class="groups-container" style="grid-template-columns: repeat(${sizesToShow.length}, 1fr);">
          ${groupsHtml}
          </div>
        </div>
      </div>

      <div class="side-col">
        <div class="card">
          <h2 style="font-size:16px; margin-bottom:4px;">💌 Mural de recados</h2>
          <p style="font-size:12px; color:var(--ink-soft); margin-bottom:10px;">As mensagens carinhosas de quem já reservou aparecem aqui.</p>
          ${buildMural()}
        </div>
      </div>
    </div>

    <p class="footer-note">Este link pode ser aberto por qualquer pessoa, sem precisar de login ou conta. As reservas aparecem para todo mundo em tempo real.</p>

    ${selectedIds.size > 0 ? (() => {
      const summary = buildSelectionSummary();
      return `
    <div class="batch-bar">
      <div class="batch-bar-summary">
        <strong>${summary.count} ite${summary.count===1?'m':'ns'} selecionado${summary.count===1?'':'s'}</strong>
        <span class="batch-bar-line">🧷 Vai precisar de: ${summary.sizeText}</span>
        <span class="batch-bar-line">🧴 E de: ${summary.productText}</span>
      </div>
      <div class="batch-bar-actions">
        <button class="btn-batch-confirm" id="batch-confirm">Reservar todos</button>
        <button class="btn-batch-cancel" id="batch-cancel">Cancelar</button>
      </div>
    </div>`;
    })() : ''}
  `;

  document.getElementById('only-available').addEventListener('change', (e) => { onlyAvailable = e.target.checked; render(); });
  const productFilterEl = document.getElementById('product-filter');
  if(productFilterEl) productFilterEl.addEventListener('change', (e) => { productFilter = e.target.value; render(); });
  document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', () => { sizeFilter = btn.getAttribute('data-filter'); render(); }));
  document.querySelectorAll('[data-reserve]').forEach(btn => btn.addEventListener('click', () => { expandedRow = parseInt(btn.getAttribute('data-reserve'),10); render(); }));
  document.querySelectorAll('[data-cancel]').forEach(btn => btn.addEventListener('click', () => { expandedRow = null; render(); }));
  document.querySelectorAll('[data-confirm]').forEach(btn => btn.addEventListener('click', () => onConfirmReserve(parseInt(btn.getAttribute('data-confirm'),10))));
  document.querySelectorAll('[data-release]').forEach(btn => btn.addEventListener('click', () => onRelease(parseInt(btn.getAttribute('data-release'),10))));
  document.querySelectorAll('[data-check]').forEach(cb => cb.addEventListener('change', (e) => {
    const id = parseInt(e.target.getAttribute('data-check'), 10);
    if(e.target.checked) selectedIds.add(id); else selectedIds.delete(id);
    render();
  }));
  const batchConfirmBtn = document.getElementById('batch-confirm');
  if(batchConfirmBtn) batchConfirmBtn.addEventListener('click', onBatchReserve);
  const batchCancelBtn = document.getElementById('batch-cancel');
  if(batchCancelBtn) batchCancelBtn.addEventListener('click', () => { selectedIds.clear(); render(); });
  const dismissBtn = document.getElementById('dismiss-confirm');
  if(dismissBtn) dismissBtn.addEventListener('click', () => { lastConfirmation = null; render(); });
  const toggleMultiBtn = document.getElementById('toggle-multi');
  if(toggleMultiBtn) toggleMultiBtn.addEventListener('click', () => { multiMode = !multiMode; if(!multiMode) selectedIds.clear(); render(); });

  // Restaura a posição de rolagem capturada antes de redesenhar
  document.querySelectorAll('.size-column[data-size]').forEach(el => {
    const key = el.getAttribute('data-size');
    if(scrollState[key] != null) el.scrollTop = scrollState[key];
  });
  const sideColAfter = document.querySelector('.side-col');
  if(sideColAfter && scrollState.__side__ != null) sideColAfter.scrollTop = scrollState.__side__;
  window.scrollTo(0, pageScrollY);
}

function renderItemRow(item){
  const taken = !!item.claimed_by;
  let inner;
  if(taken){
    inner = `
      <div class="item-left"><span class="item-num">Nº ${item.id}</span><span class="item-desc"><strong>1 pacote de fralda ${item.size}</strong> + ${escapeHtml(item.extra_item)}</span></div>
      <div class="item-right"><span class="badge-taken">Reservado por ${escapeHtml(item.claimed_by)}</span><button class="btn-release" data-release="${item.id}">liberar</button></div>`;
  } else {
    inner = `
      <div class="item-left">${multiMode ? `<input type="checkbox" class="item-check" data-check="${item.id}" ${selectedIds.has(item.id) ? 'checked' : ''}>` : ''}<span class="item-num">Nº ${item.id}</span><span class="item-desc"><strong>1 pacote de fralda ${item.size}</strong> + ${escapeHtml(item.extra_item)}</span></div>
      <div class="item-right"><button class="btn-reserve" data-reserve="${item.id}">Reservar</button></div>`;
  }
  const formHtml = expandedRow === item.id && !taken ? `
    <div class="reserve-form">
      <label for="rname-${item.id}">Seu nome</label>
      <input type="text" id="rname-${item.id}" placeholder="Ex: Tia Marcela">
      <label for="rmsg-${item.id}">Recadinho (opcional)</label>
      <textarea id="rmsg-${item.id}" rows="2" placeholder="Uma mensagem carinhosa"></textarea>
      <div class="reserve-form-actions">
        <button class="btn-confirm" data-confirm="${item.id}">Confirmar</button>
        <button class="btn-cancel" data-cancel="${item.id}">Cancelar</button>
      </div>
    </div>` : '';
  return `<div class="item-row-wrap"><div class="item-row ${taken?'taken':''}">${inner}</div>${formHtml}</div>`;
}

function genReleaseCode(){
  return Math.random().toString(36).slice(2,6).toUpperCase();
}

async function onConfirmReserve(id){
  const name = document.getElementById(`rname-${id}`).value.trim();
  const message = document.getElementById(`rmsg-${id}`).value.trim();
  if(!name){ showToast('Escreva seu nome para reservar.'); return; }

  const releaseCode = genReleaseCode();

  // Atualiza só se ainda ninguém reservou (evita corrida entre dois convidados)
  const { data, error } = await sb.from('diaper_items')
    .update({ claimed_by: name, message, claimed_at: new Date().toISOString(), release_code: releaseCode })
    .eq('id', id)
    .is('claimed_by', null)
    .select();

  if(error){ showToast('Erro ao reservar: ' + error.message); return; }
  if(!data || data.length === 0){
    showToast('Ops, esse item acabou de ser reservado por outra pessoa!');
    await loadItems();
    return;
  }
  localStorage.setItem('diaper_release_' + id, releaseCode);
  expandedRow = null;
  await loadItems();
  const reservedItem = items.find(i => i.id === id);
  lastConfirmation = {
    name,
    code: releaseCode,
    items: [{ id, size: reservedItem ? reservedItem.size : '', extra: reservedItem ? reservedItem.extra_item : '' }]
  };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function onBatchReserve(){
  const summary = buildSelectionSummary();
  const confirmMsg = `Você está reservando ${summary.count} ite${summary.count===1?'m':'ns'}. Isso significa trazer:\n\n🧷 ${summary.sizeText}\n🧴 ${summary.productText}\n\n(Repare que produtos repetidos, tipo "2x Lenço umedecido", precisam de 2 pacotes separados, um para cada número reservado.)\n\nConfirma?`;
  if(!confirm(confirmMsg)) return;

  const name = prompt(`Seu nome (vai ser usado para os ${selectedIds.size} itens selecionados):`);
  if(!name || !name.trim()) return;
  const message = prompt('Recadinho opcional (o mesmo vale para todos, pode deixar em branco):') || '';
  const releaseCode = genReleaseCode();
  const ids = Array.from(selectedIds);
  let ok = 0, fail = 0;

  for(const id of ids){
    const { data, error } = await sb.from('diaper_items')
      .update({ claimed_by: name.trim(), message: message.trim(), claimed_at: new Date().toISOString(), release_code: releaseCode })
      .eq('id', id)
      .is('claimed_by', null)
      .select();
    if(!error && data && data.length){
      localStorage.setItem('diaper_release_' + id, releaseCode);
      ok++;
    } else {
      fail++;
    }
  }

  selectedIds.clear();
  await loadItems();

  if(ok > 0){
    const reservedNow = items.filter(i => ids.includes(i.id) && i.release_code === releaseCode);
    lastConfirmation = {
      name: name.trim(),
      code: releaseCode,
      items: reservedNow.map(i => ({ id: i.id, size: i.size, extra: i.extra_item }))
    };
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  if(fail > 0){
    showToast(`${fail} ite${fail===1?'m':'ns'} já ${fail===1?'tinha':'tinham'} sido reservado(s) por outra pessoa antes de você confirmar.`);
  }
}

async function onRelease(id){
  const savedCode = localStorage.getItem('diaper_release_' + id);
  let code = savedCode;
  if(!code){
    code = prompt('Digite o código de 4 dígitos que foi mostrado para quem reservou este item:');
    if(!code) return;
    code = code.trim().toUpperCase();
  } else {
    if(!confirm('Liberar esta reserva?')) return;
  }

  const { data, error } = await sb.from('diaper_items')
    .update({ claimed_by: null, message: null, claimed_at: null, release_code: null })
    .eq('id', id)
    .eq('release_code', code)
    .select();

  if(error){ showToast('Erro ao liberar: ' + error.message); return; }
  if(!data || data.length === 0){
    showToast('Código incorreto. Peça para quem reservou, ou peça para a anfitriã liberar direto pelo banco de dados.');
    return;
  }
  localStorage.removeItem('diaper_release_' + id);
  showToast('Reserva liberada.');
  await loadItems();
}


// Atualiza em tempo real quando outra pessoa reserva/libera algo
sb.channel('diaper_items_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'diaper_items' }, () => { loadItems(); })
  .subscribe();

loadItems();
</script>
